name: Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v1.0.0, v1.2.3, etc.

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel a running deploy

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}/api
  WEB_IMAGE: ${{ github.repository }}/web

jobs:
  # ── Build & push Docker images ───────────────────────────────────────────────
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      web_tag: ${{ steps.meta-web.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Docker meta — Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/next-web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Database migrations ──────────────────────────────────────────────────────
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: build-images
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run migrations
        run: npm run db:migrate
        env:
          DB_SERVER: ${{ secrets.PROD_DB_SERVER }}
          DB_USER:   ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_NAME:   ${{ secrets.PROD_DB_NAME }}
          DB_ENCRYPT: "true"
          DB_TRUST_SERVER_CERTIFICATE: "false"

      - name: Deploy stored procedures
        run: npm run db:deploy-sps
        env:
          DB_SERVER: ${{ secrets.PROD_DB_SERVER }}
          DB_USER:   ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_NAME:   ${{ secrets.PROD_DB_NAME }}
          DB_ENCRYPT: "true"
          DB_TRUST_SERVER_CERTIFICATE: "false"

  # ── Deploy to production server ──────────────────────────────────────────────
  deploy:
    name: Deploy containers
    runs-on: ubuntu-latest
    needs: migrate
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/projectflow

            # Pull latest images
            docker pull ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.ref_name }}
            docker pull ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ github.ref_name }}

            # Update compose override with new image tags
            export API_IMAGE_TAG=${{ github.ref_name }}
            export WEB_IMAGE_TAG=${{ github.ref_name }}

            docker compose pull
            docker compose up -d --no-deps --remove-orphans api web

            # Health check — wait up to 60 s for API to respond
            for i in $(seq 1 12); do
              curl -sf http://localhost:3001/api/v1/health && echo "API healthy" && break
              echo "Waiting for API... ($i/12)"
              sleep 5
            done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          generate_release_notes: false
