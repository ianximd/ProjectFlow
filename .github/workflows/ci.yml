name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check API
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Type-check Next.js
        working-directory: apps/next-web
        run: npx tsc --noEmit

      - name: Lint Next.js
        working-directory: apps/next-web
        run: npm run lint

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Build Next.js
        working-directory: apps/next-web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ── Integration tests ────────────────────────────────────────────────────────
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "YourStrong@Passw0rd"
          ACCEPT_EULA: "Y"
        ports:
          - "1433:1433"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'YourStrong@Passw0rd' -C \
            -i infra/sql/create_db.sql

      - name: Run migrations
        run: npm run db:migrate
        env:
          DB_SERVER: localhost
          DB_USER: sa
          DB_PASSWORD: "YourStrong@Passw0rd"
          DB_NAME: ProjectFlow
          DB_TRUST_SERVER_CERTIFICATE: "true"

      - name: Deploy stored procedures
        run: npm run db:deploy-sps
        env:
          DB_SERVER: localhost
          DB_USER: sa
          DB_PASSWORD: "YourStrong@Passw0rd"
          DB_NAME: ProjectFlow
          DB_TRUST_SERVER_CERTIFICATE: "true"

      - name: Run API tests
        run: node test-auth.js && node test-phase1.js && node test-tasks.js
        env:
          DB_SERVER: localhost
          DB_USER: sa
          DB_PASSWORD: "YourStrong@Passw0rd"
          DB_NAME: ProjectFlow
          DB_TRUST_SERVER_CERTIFICATE: "true"
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-32-chars-minimum!!
          NODE_ENV: test
