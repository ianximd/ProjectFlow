name: E2E (nightly)

# Runs the Playwright smoke flow once a day plus on demand. Deliberately
# NOT on PR — Playwright is too slow (~5 min total: SP deploy + browser
# install + browser flow) to be in the PR critical path. Regressions in
# the unit + integration suites cover the same surfaces faster.

on:
  schedule:
    # 03:00 UTC = 10:00 WIB (Western Indonesia Time).
    - cron: '0 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "YourStrong@Passw0rd"
          ACCEPT_EULA: "Y"
        ports:
          - "1433:1433"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DB_SERVER:                   localhost
      DB_USER:                     sa
      DB_PASSWORD:                 "YourStrong@Passw0rd"
      DB_NAME:                     ProjectFlow
      DB_TRUST_SERVER_CERTIFICATE: "true"
      REDIS_URL:                   redis://localhost:6379
      JWT_SECRET:                  ci-e2e-secret-32-chars-minimum!!
      NEXT_PUBLIC_API_URL:         http://localhost:3001
      CI:                          'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create ProjectFlow database
        run: |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'YourStrong@Passw0rd' -C \
            -i infra/sql/create_db.sql

      - name: Run migrations
        run: npm run db:migrate

      - name: Deploy stored procedures
        run: npm run db:deploy-sps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
